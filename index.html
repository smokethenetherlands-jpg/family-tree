<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Семейное дерево Левкиных</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Звёздный фон -->
  <canvas id="stars-canvas"></canvas>

  <!-- Toolbar -->
  <header class="toolbar" id="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">Семейное дерево</span>
      <span class="toolbar-stats" id="toolbar-stats"></span>
    </div>

    <div class="toolbar-center">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Поиск по имени...">
        <button class="search-clear" id="search-clear" aria-label="Очистить">✕</button>
      </div>
    </div>

    <div class="toolbar-right">
      <button class="tb-btn" id="btn-png" title="Скачать PNG">
        <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v10m0 0l-3.5-3.5M10 13l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 14v1a2 2 0 002 2h10a2 2 0 002-2v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>PNG</span>
      </button>
      <button class="tb-btn" id="btn-share" title="Копировать ссылку">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="15" cy="5" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="5" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="15" cy="15" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 9l6-3M7 11l6 3" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Ссылка</span>
      </button>
      <button class="tb-btn" id="btn-birthday" title="Ближайший день рождения">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="10" width="14" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 10V7M13 10V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="6" r="1.5" fill="currentColor"/><circle cx="13" cy="6" r="1.5" fill="currentColor"/></svg>
        <span>ДР</span>
      </button>
    </div>

    <!-- Кнопка поиска (только мобиль) -->
    <button class="tb-search-btn" id="btn-search-top" aria-label="Поиск">
      <svg viewBox="0 0 20 20" fill="none">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M13 13l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- Основной холст дерева -->
  <div class="tree-viewport" id="tree-viewport">
    <svg class="connections-svg" id="connections-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="nodes-layer" id="nodes-layer"></div>
  </div>

  <!-- Режим «Фокус» (мобиль) -->
  <div id="focus-view" class="focus-view hidden">
    <div class="focus-nav">
      <button id="focus-back" class="focus-back-btn" aria-label="Назад">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Назад
      </button>
      <button id="focus-tree-btn" class="focus-tree-btn" aria-label="Всё дерево">
        Всё дерево
      </button>
    </div>
    <div id="focus-parents" class="focus-row focus-parents-row"></div>
    <div class="focus-center-row">
      <div id="focus-center" class="focus-center-wrap"></div>
      <div id="focus-couple-connector" class="focus-couple-connector" style="display:none"></div>
      <div id="focus-spouse" class="focus-spouse-wrap"></div>
    </div>
    <div id="focus-children" class="focus-row focus-children-row"></div>
  </div>

  <!-- Боковая панель персонажа -->
  <aside class="person-panel" id="person-panel">
    <button class="panel-close" id="panel-close" aria-label="Закрыть">✕</button>

    <!-- Peek-bar: компактный вид (мобиль, начальное состояние) -->
    <div class="panel-peek-bar" id="panel-peek-bar">
      <div class="panel-peek-row">
        <div class="panel-peek-photo-wrap">
          <img class="panel-peek-photo" id="panel-peek-img" src="" alt="">
          <div class="panel-peek-ph" id="panel-peek-ph">
            <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="22" r="12" stroke="currentColor" stroke-width="2"/><path d="M8 55c0-12 10-20 22-20s22 8 22 20" stroke="currentColor" stroke-width="2"/></svg>
          </div>
        </div>
        <span class="panel-peek-name" id="panel-peek-name"></span>
      </div>
      <div class="panel-quick-rels" id="panel-quick-rels"></div>
    </div>

    <!-- Полный контент панели -->
    <div class="panel-full-content">
      <div class="panel-photo-wrap">
        <img class="panel-photo" id="panel-photo" src="" alt="">
        <div class="panel-photo-placeholder" id="panel-photo-placeholder">
          <svg viewBox="0 0 60 60" fill="none"><circle cx="30" cy="22" r="12" stroke="currentColor" stroke-width="2"/><path d="M8 55c0-12 10-20 22-20s22 8 22 20" stroke="currentColor" stroke-width="2"/></svg>
        </div>
      </div>
      <div class="panel-body">
        <h2 class="panel-name" id="panel-name"></h2>
        <div class="panel-meta" id="panel-meta"></div>
        <div class="panel-relatives" id="panel-relatives"></div>
      </div>
    </div>
  </aside>

  <!-- Toast уведомление -->
  <div class="toast" id="toast"></div>

  <!-- Поисковый оверлей (мобиль) -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-overlay-bar">
      <button class="search-overlay-back" id="search-overlay-back" aria-label="Назад">
        <svg viewBox="0 0 20 20" fill="none"><path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <input type="text" class="search-overlay-input" id="search-overlay-input" placeholder="Поиск по имени...">
      <button class="search-overlay-clear" id="search-overlay-clear" aria-label="Очистить">✕</button>
    </div>
    <div class="search-overlay-results" id="search-overlay-results"></div>
  </div>

  <!-- Кнопка легенды (мобиль) -->
  <button class="legend-toggle" id="btn-legend" aria-label="Легенда">?</button>

  <!-- Легенда типов связей -->
  <div class="conn-legend">
    <div class="conn-legend-item">
      <svg width="28" height="8" aria-hidden="true"><line x1="0" y1="4" x2="28" y2="4" stroke="rgba(212,168,75,0.85)" stroke-width="2.5"/></svg>
      <span>Супруги</span>
    </div>
    <div class="conn-legend-item">
      <svg width="28" height="8" aria-hidden="true"><line x1="0" y1="4" x2="28" y2="4" stroke="rgba(120,158,210,0.65)" stroke-width="1.5"/></svg>
      <span>Родство</span>
    </div>
    <div class="conn-legend-item">
      <svg width="28" height="8" aria-hidden="true"><line x1="0" y1="4" x2="28" y2="4" stroke="rgba(185,118,225,0.75)" stroke-width="1.8" stroke-dasharray="7 4"/></svg>
      <span>Отчим / Мачеха / В разводе</span>
    </div>
    <div class="conn-legend-sep"></div>
    <div class="conn-legend-item conn-legend-hint">
      <svg width="28" height="8" aria-hidden="true" viewBox="0 0 28 8">
        <rect x="2" y="2" width="10" height="4" rx="1" stroke="rgba(100,165,255,0.55)" stroke-width="1" fill="none"/>
        <rect x="16" y="2" width="10" height="4" rx="1" stroke="rgba(100,165,255,0.55)" stroke-width="1" fill="none"/>
      </svg>
      <span>Ctrl+click — выбор нескольких</span>
    </div>
  </div>

  <!-- Mobile bottom bar (5 кнопок: поиск, дерево, фокус, ДР, поделиться) -->
  <nav class="mobile-bottom-bar" id="mobile-bottom-bar">
    <button class="mb-btn" id="btn-search-mb" title="Поиск">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M13 13l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="mb-btn mb-btn-mode" id="btn-tree-mode" title="Всё дерево">
      <svg viewBox="0 0 20 20" fill="none"><rect x="8" y="1" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="2" y="8" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="14" y="8" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><rect x="8" y="15" width="4" height="4" rx="1" stroke="currentColor" stroke-width="1.4"/><path d="M10 5v3M4 12v3M16 12v3M6 10h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
    <button class="mb-btn mb-btn-mode" id="btn-focus-mode" title="Фокус">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="5" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2" fill="currentColor"/><path d="M10 2v3M10 15v3M2 10h3M15 10h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <button class="mb-btn" id="btn-birthday-mb" title="Дни рождения">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="10" width="14" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 10V7M13 10V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="7" cy="6" r="1.5" fill="currentColor"/><circle cx="13" cy="6" r="1.5" fill="currentColor"/></svg>
    </button>
    <button class="mb-btn" id="btn-share-mb" title="Копировать ссылку">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="15" cy="5" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="5" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="15" cy="15" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 9l6-3M7 11l6 3" stroke="currentColor" stroke-width="1.5"/></svg>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="data.js"></script>
  <script src="tree.js"></script>
</body>
</html>
